# nginx.conf
# Production nginx configuration.
# Serves React static files AND proxies /api/* to the FastAPI backend.
# This is the single entry point for all browser traffic.
#
# Local Docker:  browser → nginx:80 → api:8000 (internal)
# Production:    nginx serves frontend only; API is separate on Render

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"               always;
    add_header X-Content-Type-Options    "nosniff"                  always;
    add_header Referrer-Policy           "no-referrer-when-downgrade" always;
    add_header Permissions-Policy        "camera=(), microphone=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline'; \
         style-src 'self' 'unsafe-inline'; \
         img-src 'self' data:; \
         connect-src 'self';"             always;

    # ── API proxy ──────────────────────────────────────────────────────
    # Browser calls /api/* → nginx forwards to FastAPI container
    # "api" resolves via Docker Compose internal DNS
    # No localhost. No port 8000 in the browser.
    location /api/ {
        proxy_pass         http://api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ── Health check proxy ────────────────────────────────────────────
    location /health {
        proxy_pass         http://api:8000/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Static assets — aggressive caching ───────────────────────────
    # Vite adds content hash to filenames so stale cache is never a risk
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA fallback ──────────────────────────────────────────────────
    # All other paths fall back to index.html
    # React Router handles the actual routing in the browser
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Gzip compression ──────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/javascript
                      application/json image/svg+xml;
    gzip_min_length   1000;
}