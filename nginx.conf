# nginx.conf
# Serves the React single-page application.
# try_files falls back to index.html — required for React Router.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Static assets — cache aggressively
    # Vite adds content hash to filenames so stale cache is not a risk
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # All other routes fall back to index.html
    # React Router handles the actual routing in the browser
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1000;
}